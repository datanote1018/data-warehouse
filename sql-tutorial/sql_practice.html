<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiveSQL 教程+练习平台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #1e1e2e;
  --bg-secondary: #181825;
  --bg-surface: #252538;
  --bg-hover: #313147;
  --text-primary: #cdd6f4;
  --text-secondary: #a6adc8;
  --text-muted: #6c7086;
  --accent: #89b4fa;
  --accent-hover: #74c7ec;
  --green: #a6e3a1;
  --yellow: #f9e2af;
  --red: #f38ba8;
  --orange: #fab387;
  --border: #45475a;
  --radius: 8px;
}
html, body { height: 100%; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-primary); color: var(--text-primary); }
body { display: flex; flex-direction: column; }
header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 20px; font-weight: 600; }
header h1 span { color: var(--accent); }
header .subtitle { font-size: 13px; color: var(--text-muted); }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 340px; min-width: 300px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; cursor: pointer; background: transparent; border: none; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all .2s; }
.sidebar-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }
.sidebar-content::-webkit-scrollbar { width: 6px; }
.sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.table-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.table-card-header { padding: 10px 12px; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.table-card-header:hover { background: var(--bg-hover); }
.table-card-header .arrow { transition: transform .2s; font-size: 11px; color: var(--text-muted); }
.table-card-header .arrow.open { transform: rotate(90deg); }
.table-card-body { display: none; border-top: 1px solid var(--border); }
.table-card-body.open { display: block; }
.table-card-body table { width: 100%; font-size: 12px; border-collapse: collapse; }
.table-card-body th { background: var(--bg-hover); padding: 5px 10px; text-align: left; color: var(--text-muted); font-weight: 500; }
.table-card-body td { padding: 5px 10px; border-top: 1px solid var(--border); }
.table-card-body td:first-child { color: var(--accent); font-family: 'Consolas', 'Fira Code', monospace; }
.table-card-body td:nth-child(2) { color: var(--orange); font-family: monospace; font-size: 11px; }
.table-card .row-count { font-size: 11px; color: var(--text-muted); font-weight: 400; }
.schema-note { font-size: 11px; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px; padding: 8px 10px; background: var(--bg-surface); border-radius: 6px; border-left: 3px solid var(--yellow); }
.level-group { margin-bottom: 16px; }
.level-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-left: 4px; }
.level-label.beginner { color: var(--green); }
.level-label.intermediate { color: var(--yellow); }
.level-label.advanced { color: var(--red); }
.exercise-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 4px; transition: all .15s; display: flex; align-items: baseline; gap: 8px; }
.exercise-item:hover { background: var(--bg-hover); }
.exercise-item.active { background: var(--accent); color: var(--bg-primary); }
.exercise-item .num { font-weight: 700; font-size: 12px; min-width: 22px; }
.exercise-item .tags { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
.exercise-item .tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: rgba(137,180,250,.15); color: var(--accent); }
.exercise-item.active .tag { background: rgba(30,30,46,.25); color: var(--bg-primary); }
.syntax-section { margin-bottom: 16px; }
.syntax-section h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
.syntax-block { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; font-family: monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.syntax-note { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-style: italic; font-family: sans-serif; }
.syntax-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: 6px; font-family: sans-serif; }
.badge-ok { background: rgba(166,227,161,.15); color: var(--green); }
.badge-ref { background: rgba(249,226,175,.15); color: var(--yellow); }
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.exercise-bar { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 12px 20px; flex-shrink: 0; display: none; }
.exercise-bar.show { display: block; }
.exercise-bar .ex-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.exercise-bar .ex-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap; }
.exercise-bar .ex-hint { font-size: 12px; color: var(--yellow); margin-top: 6px; }
.exercise-bar .ex-hint::before { content: '提示: '; font-weight: 600; }
.editor-area { flex-shrink: 0; border-bottom: 1px solid var(--border); position: relative; }
.CodeMirror { height: 220px; font-size: 14px; font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; }
.toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
.btn { padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s; }
.btn-run { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
.btn-run:hover { background: var(--accent-hover); }
.btn-clear { background: transparent; color: var(--text-secondary); }
.btn-clear:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-answer { background: transparent; color: var(--yellow); border-color: var(--yellow); }
.btn-answer:hover { background: rgba(249,226,175,.1); }
.btn-answer:disabled { opacity: .4; cursor: not-allowed; }
.toolbar .spacer { flex: 1; }
.toolbar .status { font-size: 12px; color: var(--text-muted); }
.toolbar .run-hint { font-size: 11px; color: var(--yellow); display: none; }
.toolbar .run-hint.show { display: inline; }
.results { flex: 1; overflow: auto; padding: 16px; }
.results::-webkit-scrollbar { width: 6px; height: 6px; }
.results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.result-placeholder { color: var(--text-muted); font-size: 14px; display: flex; align-items: center; justify-content: center; height: 100%; }
.result-table-wrap { overflow: auto; max-height: 100%; }
.result-table { border-collapse: collapse; font-size: 13px; min-width: 100%; }
.result-table th { background: var(--bg-surface); padding: 8px 14px; text-align: left; font-weight: 600; position: sticky; top: 0; border-bottom: 2px solid var(--accent); white-space: nowrap; }
.result-table td { padding: 6px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.result-table tr:hover td { background: var(--bg-hover); }
.result-info { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
.result-error { background: rgba(243,139,168,.1); border: 1px solid var(--red); border-radius: var(--radius); padding: 12px 16px; color: var(--red); font-family: monospace; font-size: 13px; white-space: pre-wrap; }
.result-success { background: rgba(166,227,161,.08); border: 1px solid rgba(166,227,161,.3); border-radius: var(--radius); padding: 10px 16px; color: var(--green); font-size: 13px; }
.answer-block { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-top: 12px; }
.answer-block h4 { font-size: 13px; color: var(--yellow); margin-bottom: 8px; }
.answer-block pre { font-family: 'Consolas', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; color: var(--text-primary); white-space: pre-wrap; }
footer { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 8px 24px; font-size: 12px; color: var(--text-muted); text-align: center; flex-shrink: 0; }
/* Tutorial styles */
.tutorial-chapter { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.tutorial-chapter-header { padding: 10px 12px; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.tutorial-chapter-header:hover { background: var(--bg-hover); }
.tutorial-chapter-header .arrow { transition: transform .2s; font-size: 11px; color: var(--text-muted); }
.tutorial-chapter-header .arrow.open { transform: rotate(90deg); }
.tutorial-chapter-header .stars { color: var(--yellow); font-size: 12px; margin-left: 8px; }
.tutorial-chapter-body { display: none; border-top: 1px solid var(--border); padding: 12px; font-size: 13px; line-height: 1.8; color: var(--text-secondary); }
.tutorial-chapter-body.open { display: block; }
.tutorial-chapter-body h4 { color: var(--accent); font-size: 14px; margin: 14px 0 6px 0; }
.tutorial-chapter-body h4:first-child { margin-top: 0; }
.tutorial-chapter-body p { margin: 6px 0; }
.tutorial-chapter-body ul { margin: 6px 0 6px 18px; }
.tutorial-chapter-body li { margin: 3px 0; }
.tutorial-code-block { background: #1a1a2e; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin: 8px 0; font-family: 'Consolas', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; color: var(--text-primary); position: relative; }
.btn-try { display: inline-block; padding: 3px 12px; border-radius: 4px; border: 1px solid var(--green); background: rgba(166,227,161,.12); color: var(--green); font-size: 11px; cursor: pointer; font-weight: 600; margin-top: 6px; transition: all .15s; }
.btn-try:hover { background: rgba(166,227,161,.25); }
.tutorial-tip { background: rgba(249,226,175,.08); border-left: 3px solid var(--yellow); border-radius: 0 6px 6px 0; padding: 8px 12px; margin: 8px 0; font-size: 12px; color: var(--yellow); }
.tutorial-tip::before { content: '💡 '; }
.tutorial-warn { background: rgba(243,139,168,.08); border-left: 3px solid var(--red); border-radius: 0 6px 6px 0; padding: 8px 12px; margin: 8px 0; font-size: 12px; color: var(--red); }
.tutorial-warn::before { content: '⚠ '; }
.resize-handle {
  height: 6px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: ns-resize;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.resize-handle:hover, .resize-handle.active {
  background: var(--accent);
  opacity: 0.3;
}
.resize-handle::after {
  content: '';
  width: 40px;
  height: 2px;
  background: var(--text-muted);
  border-radius: 1px;
}
.exercise-bar { max-height: 150px; overflow-y: auto; }
@media (max-width: 900px) { .sidebar { width: 260px; min-width: 220px; } }
</style>
</head>
<body>

<header>
  <div>
    <h1><span>HiveSQL</span> 教程+练习平台</h1>
    <div class="subtitle">基于 sql.js (SQLite WASM) · 遵循数仓开发规范 · 教程+练习一体化 · 支持窗口函数 / CTE / Hive 自定义函数</div>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="tutorial">教程</button>
      <button class="sidebar-tab" data-tab="schema">表结构</button>
      <button class="sidebar-tab" data-tab="exercises">练习题</button>
      <button class="sidebar-tab" data-tab="syntax">Hive函数</button>
    </div>
    <div class="sidebar-content" id="sidebar-tutorial"></div>
    <div class="sidebar-content" id="sidebar-schema" style="display:none"></div>
    <div class="sidebar-content" id="sidebar-exercises" style="display:none"></div>
    <div class="sidebar-content" id="sidebar-syntax" style="display:none"></div>
  </aside>

  <div class="content">
    <div class="exercise-bar" id="exerciseBar">
      <div class="ex-title" id="exTitle"></div>
      <div class="ex-desc" id="exDesc"></div>
      <div class="ex-hint" id="exHint"></div>
    </div>
    <div class="toolbar">
      <button class="btn btn-run" id="btnRun">&#9654; 运行</button>
      <button class="btn btn-clear" id="btnClear">清空</button>
      <button class="btn btn-answer" id="btnAnswer" disabled>查看答案</button>
      <div class="spacer"></div>
      <span class="run-hint" id="runHint">选中部分将被执行</span>
      <span class="status" id="execStatus"></span>
    </div>
    <div class="editor-area">
      <textarea id="editor"></textarea>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="results" id="results">
      <div class="result-placeholder">在上方编辑器中输入 SQL 语句，点击"运行"查看结果</div>
    </div>
  </div>
</div>

<footer>HiveSQL 教程+练习平台 · 遵循数仓开发规范(分层/命名/分区/SQL规范) · 数据均为模拟数据</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/sql-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>

<script>
// ============================================================
// 表结构定义 — 严格遵循数仓开发规范
// 命名: dim.dim_[维度]_df / dwd.dwd_[业务域]_[对象]_[行为]_di
// 字段: [业务]_id, [业务]_name, [业务]_amount, [业务]_status, dt
// ============================================================
const SCHEMA = [
  {
    name: 'dim_user_info_df',
    db: 'dim',
    fullName: 'dim.dim_user_info_df',
    comment: '用户维度表-全量',
    layer: 'DIM',
    columns: [
      ['user_id','BIGINT','用户ID'],
      ['user_name','STRING','用户名'],
      ['gender','STRING','性别(M/F)'],
      ['age','INT','年龄'],
      ['city','STRING','城市'],
      ['reg_date','STRING','注册日期'],
      ['vip_level','INT','VIP等级(0-3)'],
      ['dt','STRING','分区日期(yyyyMMdd)'],
    ],
    ddl: `CREATE TABLE dim.dim_user_info_df (
  user_id INTEGER, user_name TEXT, gender TEXT, age INTEGER,
  city TEXT, reg_date TEXT, vip_level INTEGER, dt TEXT
)`,
    rows: [], // 由 generateData() 填充
  },
  {
    name: 'dim_product_info_df',
    db: 'dim',
    fullName: 'dim.dim_product_info_df',
    comment: '商品维度表-全量',
    layer: 'DIM',
    columns: [
      ['product_id','BIGINT','商品ID'],
      ['product_name','STRING','商品名称'],
      ['category','STRING','类目'],
      ['unit_price','DECIMAL(18,2)','单价'],
      ['brand','STRING','品牌'],
      ['dt','STRING','分区日期'],
    ],
    ddl: `CREATE TABLE dim.dim_product_info_df (
  product_id INTEGER, product_name TEXT, category TEXT,
  unit_price REAL, brand TEXT, dt TEXT
)`,
    rows: [], // 由 generateData() 填充
  },
  {
    name: 'dwd_trade_order_detail_di',
    db: 'dwd',
    fullName: 'dwd.dwd_trade_order_detail_di',
    comment: '交易域-订单明细表-增量',
    layer: 'DWD',
    columns: [
      ['order_id','BIGINT','订单ID'],
      ['user_id','BIGINT','用户ID'],
      ['product_id','BIGINT','商品ID'],
      ['order_amount','DECIMAL(18,2)','订单金额'],
      ['quantity','INT','数量'],
      ['pay_time','STRING','支付时间'],
      ['order_status','STRING','状态(paid/cancelled/refunded)'],
      ['dt','STRING','分区日期'],
    ],
    ddl: `CREATE TABLE dwd.dwd_trade_order_detail_di (
  order_id INTEGER, user_id INTEGER, product_id INTEGER,
  order_amount REAL, quantity INTEGER, pay_time TEXT,
  order_status TEXT, dt TEXT
)`,
    rows: [], // 由 generateData() 填充
  },
  {
    name: 'dwd_traffic_user_action_di',
    db: 'dwd',
    fullName: 'dwd.dwd_traffic_user_action_di',
    comment: '流量域-用户行为日志表-增量',
    layer: 'DWD',
    columns: [
      ['log_id','BIGINT','日志ID'],
      ['user_id','BIGINT','用户ID'],
      ['action_type','STRING','行为类型(view/click/cart/buy/share)'],
      ['page','STRING','页面'],
      ['action_time','STRING','行为时间'],
      ['duration','INT','停留时长(秒)'],
      ['dt','STRING','分区日期'],
    ],
    ddl: `CREATE TABLE dwd.dwd_traffic_user_action_di (
  log_id INTEGER, user_id INTEGER, action_type TEXT,
  page TEXT, action_time TEXT, duration INTEGER, dt TEXT
)`,
    rows: [], // 由 generateData() 填充
  },
  {
    name: 'dwd_user_login_di',
    db: 'dwd',
    fullName: 'dwd.dwd_user_login_di',
    comment: '用户登录明细表-增量',
    layer: 'DWD',
    columns: [
      ['log_id','BIGINT','日志ID'],
      ['user_id','BIGINT','用户ID'],
      ['login_date','STRING','登录日期'],
      ['dt','STRING','分区日期'],
    ],
    ddl: `CREATE TABLE dwd.dwd_user_login_di (
  log_id INTEGER, user_id INTEGER, login_date TEXT, dt TEXT
)`,
    rows: [], // 由 generateData() 填充
  },
  {
    name: 'dwd_live_room_log_di',
    db: 'dwd',
    fullName: 'dwd.dwd_live_room_log_di',
    comment: '互动域-直播间进出记录表-增量',
    layer: 'DWD',
    columns: [
      ['log_id','BIGINT','日志ID'],
      ['room_id','BIGINT','直播间ID'],
      ['user_id','BIGINT','用户ID'],
      ['action','STRING','动作(enter/leave)'],
      ['action_time','STRING','动作时间'],
      ['dt','STRING','分区日期'],
    ],
    ddl: `CREATE TABLE dwd.dwd_live_room_log_di (
  log_id INTEGER, room_id INTEGER, user_id INTEGER,
  action TEXT, action_time TEXT, dt TEXT
)`,
    rows: [], // 由 generateData() 填充
  },
  {
    name: 'dwd_user_follow_di',
    db: 'dwd',
    fullName: 'dwd.dwd_user_follow_di',
    comment: '互动域-用户关注关系表-增量',
    layer: 'DWD',
    columns: [
      ['log_id','BIGINT','日志ID'],
      ['user_id','BIGINT','关注者ID'],
      ['follow_user_id','BIGINT','被关注者ID'],
      ['follow_time','STRING','关注时间'],
      ['dt','STRING','分区日期'],
    ],
    ddl: `CREATE TABLE dwd.dwd_user_follow_di (
  log_id INTEGER, user_id INTEGER, follow_user_id INTEGER,
  follow_time TEXT, dt TEXT
)`,
    rows: [], // 由 generateData() 填充
  },
];

// ============================================================
// 练习题 — SQL 严格遵循数仓开发规范
// 关键字大写 · 必须带 dt 分区条件 · 字段换行对齐
// JOIN 必须明确类型 · 维度表 dt 放 ON 子句
// ============================================================
const EXERCISES = [
  // ---- 初级 ----
  {
    id: 1, level: 'beginner',
    title: '基础 SELECT + WHERE 过滤',
    tags: ['SELECT','WHERE'],
    desc: '查询所有来自"北京"的用户的 user_id、user_name 和 age。\n注意: 所有分区表查询必须带 dt 分区条件。',
    hint: 'SELECT ... FROM dim.dim_user_info_df WHERE dt = \'20250101\' AND city = \'北京\'',
    answer: `SELECT
    user_id,
    user_name,
    age
FROM dim.dim_user_info_df
WHERE dt = '20250101'
    AND city = '北京';`,
  },
  {
    id: 2, level: 'beginner',
    title: '排序与限制',
    tags: ['ORDER BY','LIMIT'],
    desc: '查询订单金额最高的前 5 笔已支付订单(order_status=\'paid\')，显示 order_id、order_amount、pay_time，按金额降序排列。\nDWD 表的 dt 分区使用范围条件覆盖2025年1月所有数据。',
    hint: 'WHERE dt >= \'20250101\' AND dt <= \'20250130\' AND order_status = \'paid\' ORDER BY order_amount DESC LIMIT 5',
    answer: `SELECT
    order_id,
    order_amount,
    pay_time
FROM dwd.dwd_trade_order_detail_di
WHERE dt >= '20250101' AND dt <= '20250130'
    AND order_status = 'paid'
ORDER BY order_amount DESC
LIMIT 5;`,
  },
  {
    id: 3, level: 'beginner',

<h4>什么是窗口函数？</h4>
<p>窗口函数在不减少行数的情况下，对"窗口"内的数据进行计算。语法：</p>
<div class="tutorial-code-block">函数名() OVER (
    [PARTITION BY 分组列]
    [ORDER BY 排序列]
    [ROWS/RANGE 窗口范围]
)</div>

<h4>常用窗口函数</h4>
<ul>
  <li><b>ROW_NUMBER()</b>：行号（不并列：1,2,3,4）</li>
  <li><b>RANK()</b>：排名（并列跳号：1,1,3）</li>
  <li><b>DENSE_RANK()</b>：排名（并列不跳：1,1,2）</li>
  <li><b>LAG(col, n)</b>：取前 n 行的值</li>
  <li><b>LEAD(col, n)</b>：取后 n 行的值</li>
  <li><b>SUM/AVG/COUNT OVER()</b>：窗口内聚合</li>
</ul>

<h4>示例1：ROW_NUMBER / RANK</h4>
<div class="tutorial-code-block" id="tut-ex-6-1">SELECT
    user_id,
    order_id,
    order_amount,
    ROW_NUMBER() OVER (
        PARTITION BY user_id
        ORDER BY order_amount DESC
    ) AS rn,
    RANK() OVER (
        PARTITION BY user_id
        ORDER BY order_amount DESC
    ) AS rnk
FROM dwd.dwd_trade_order_detail_di
WHERE dt >= '20250101' AND dt <= '20250130'
    AND order_status = 'paid'
    AND user_id IN (1, 2, 3)
ORDER BY user_id, rn;</div>

    pay_time,

<h4>分区表</h4>
<p>Hive 表按 dt（日期）分区，物理上每个分区是一个目录。查询时指定 dt 可以避免全表扫描。</p>
<div class="tutorial-code-block">-- Hive DDL（仅展示，本平台不可执行）
CREATE TABLE dwd.dwd_trade_order_detail_di (
    order_id   BIGINT,
    user_id    BIGINT,
    order_amount DECIMAL(18,2)
)
PARTITIONED BY (dt STRING)
STORED AS PARQUET;</div>

<h4>Hive 数据类型</h4>
<ul>
  <li><b>基本类型：</b>TINYINT, SMALLINT, INT, BIGINT, FLOAT, DOUBLE, DECIMAL, STRING, BOOLEAN</li>
  <li><b>复合类型：</b>ARRAY, MAP, STRUCT</li>
  <li><b>日期类型：</b>DATE, TIMESTAMP (但常用 STRING 存储日期)</li>
</ul>

<h4>EXPLODE 与 LATERAL VIEW</h4>
<p>EXPLODE 将数组/Map 展开为多行，LATERAL VIEW 将展开结果与原表关联（Hive 特有语法，本平台仅做参考）。</p>

<h4>性能优化要点</h4>
<ul>
  <li>始终带 <b>dt 分区条件</b></li>
  <li>避免 <b>SELECT *</b>，只取需要的列</li>
  <li>大表 JOIN 小表，小表放右边</li>
  <li>使用 <b>MapJoin</b> 优化小表 JOIN</li>
  <li>避免数据倾斜：对倾斜 key 做特殊处理</li>
</ul>

<h4>实战：连续登录天数</h4>
<p>经典面试题！思路：用 ROW_NUMBER 编号后，login_date - rn 得到分组标识，相同标识代表连续登录。</p>
<div class="tutorial-code-block" id="tut-ex-7-1">WITH login_ranked AS (
    SELECT DISTINCT
        user_id,
        login_date,
        ROW_NUMBER() OVER (
            PARTITION BY user_id
            ORDER BY login_date
        ) AS rn
    FROM dwd.dwd_user_login_di
    WHERE dt >= '20250101' AND dt <= '20250130'
),
login_grouped AS (
    SELECT
        user_id,
        login_date,
        DATE_SUB(login_date, rn) AS grp
    FROM login_ranked
)
SELECT
    user_id,
    MIN(login_date) AS start_date,
    MAX(login_date) AS end_date,
    COUNT(1) AS consecutive_days
FROM login_grouped
GROUP BY user_id, grp
HAVING COUNT(1) >= 3
ORDER BY consecutive_days DESC, user_id
LIMIT 20;</div>

<div class="tutorial-code-block" id="tut-ex-7-2">WITH daily_login AS (

    const h = randInt(6, 23), mi = randInt(0, 59);
    const at = `${dtDash} ${pad2(h)}:${pad2(mi)}:00`;
    // ~2% duration为NULL
    const dur = maybeNull(randInt(a[2], a[3]), 0.02);
    logs.push([i + 1, uid, a[0], a[1], at, dur, dt]);
  }
  SCHEMA[3].rows = logs;

  // ---- dwd_user_login_di (~600 login records, 分布在30天) ----
  const loginLogs = [];
  let logId = 1;
  // Create login patterns: some users login frequently with consecutive days
  const activeUsers = [];
  for (let i = 0; i < 20; i++) activeUsers.push(randInt(1, 100));
  // Generate consecutive login streaks for active users
  for (const uid of activeUsers) {
    const streakCount = randInt(1, 3);
    for (let s = 0; s < streakCount; s++) {
      const startD = randInt(1, 22);
      const streakLen = randInt(3, 7);
      for (let d = 0; d < streakLen; d++) {
        const day = startD + d;
        if (day > 30) break;
        const dt = `2025${pad2(1)}${pad2(day)}`;
        const loginDate = `2025-01-${pad2(day)}`;
        loginLogs.push([logId++, uid, loginDate, dt]);
      }
    }
  }
  // Generate random logins for other users
  for (let i = 0; i < 300; i++) {
    const uid = randInt(1, 100);
    const day = randInt(1, 30);
    const dt = `2025${pad2(1)}${pad2(day)}`;
    const loginDate = `2025-01-${pad2(day)}`;
    loginLogs.push([logId++, uid, loginDate, dt]);
  }
  SCHEMA[4].rows = loginLogs;

  // ---- dwd_live_room_log_di (直播间进出记录) ----
  // 3个直播间, 每个直播间在1月15日有多个用户进出, 构造明确的峰值
  const liveLogs = [];
  let liveLogId = 1;
  const roomIds = [1001, 1002, 1003];
  const dt15 = '20250115';
  const dtDash15 = '2025-01-15';

  // room 1001: 峰值 5 人 (14:20~14:25 时有5人同时在线)
  const room1001 = [
    [1,  '08:00', '09:30'],
    [2,  '08:30', '10:00'],
    [3,  '10:00', '11:30'],
    [4,  '14:00', '15:00'],
    [5,  '14:05', '15:30'],
    [6,  '14:10', '16:00'],
    [7,  '14:15', '14:50'],
    [8,  '14:20', '14:45'],  // 此时 4,5,6,7,8 都在 → 峰值5人
    [9,  '16:00', '17:00'],
    [10, '16:30', '17:30'],
    [11, '20:00', '21:00'],
    [12, '20:30', '21:30'],
  ];
  for (const [uid, enter, leave] of room1001) {
    liveLogs.push([liveLogId++, 1001, uid, 'enter', `${dtDash15} ${enter}:00`, dt15]);
    liveLogs.push([liveLogId++, 1001, uid, 'leave', `${dtDash15} ${leave}:00`, dt15]);
  }

  // room 1002: 峰值 4 人
  const room1002 = [
    [20, '09:00', '10:30'],
    [21, '09:15', '10:00'],
    [22, '09:20', '11:00'],
    [23, '09:25', '09:50'],  // 9:25时 20,21,22,23 都在 → 峰值4人
    [24, '13:00', '14:00'],
    [25, '13:30', '14:30'],
    [26, '15:00', '16:00'],
    [27, '19:00', '20:00'],
    [28, '19:30', '20:30'],
  ];
  for (const [uid, enter, leave] of room1002) {
    liveLogs.push([liveLogId++, 1002, uid, 'enter', `${dtDash15} ${enter}:00`, dt15]);
    liveLogs.push([liveLogId++, 1002, uid, 'leave', `${dtDash15} ${leave}:00`, dt15]);
  }

  // room 1003: 峰值 3 人
  const room1003 = [
    [40, '10:00', '11:00'],
    [41, '10:20', '11:30'],
    [42, '10:30', '11:00'],  // 10:30时 40,41,42 都在 → 峰值3人
    [43, '14:00', '15:00'],
    [44, '14:30', '15:30'],
    [45, '20:00', '21:00'],
  ];
  for (const [uid, enter, leave] of room1003) {
    liveLogs.push([liveLogId++, 1003, uid, 'enter', `${dtDash15} ${enter}:00`, dt15]);
    liveLogs.push([liveLogId++, 1003, uid, 'leave', `${dtDash15} ${leave}:00`, dt15]);
  }

  SCHEMA[5].rows = liveLogs;

  // ---- dwd_user_follow_di (用户关注关系) ----
  // 构造明确的互关对: (1,2)(2,1), (3,5)(5,3), (4,7)(7,4), (10,15)(15,10), (20,30)(30,20)
  // 共 5 对互关, 加上一些单向关注
  const followLogs = [];
  let followLogId = 1;
  const dtFollow = '20250115';
  const dtDashFollow = '2025-01-15';

  // 5 对互相关注
  const mutualPairs = [[1,2],[3,5],[4,7],[10,15],[20,30]];
  for (const [a, b] of mutualPairs) {
    const h1 = pad2(randInt(8,12)), m1 = pad2(randInt(0,59));
    const h2 = pad2(randInt(13,18)), m2 = pad2(randInt(0,59));
    followLogs.push([followLogId++, a, b, `${dtDashFollow} ${h1}:${m1}:00`, dtFollow]);
    followLogs.push([followLogId++, b, a, `${dtDashFollow} ${h2}:${m2}:00`, dtFollow]);
  }

  // 单向关注 (不构成互关)
  const oneWay = [[1,5],[1,8],[2,10],[3,9],[6,1],[6,2],[8,12],[9,20],[11,3],[13,7],[15,4],[18,25],[22,1],[25,6],[30,9],[35,40],[42,50],[50,60],[55,70],[60,1]];
  for (const [a, b] of oneWay) {
    const h = pad2(randInt(8,22)), m = pad2(randInt(0,59));
    followLogs.push([followLogId++, a, b, `${dtDashFollow} ${h}:${m}:00`, dtFollow]);
  }

  SCHEMA[6].rows = followLogs;
}

// ============================================================
// 数据库初始化 + Hive 函数注册
// ============================================================
async function initDB() {
  const SQL = await initSqlJs({
    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}`
  });
  db = new SQL.Database();

  // 附加数据库(模拟 Hive 库名.表名)
  db.run("ATTACH DATABASE ':memory:' AS ods");
  db.run("ATTACH DATABASE ':memory:' AS dwd");
  db.run("ATTACH DATABASE ':memory:' AS dws");
  db.run("ATTACH DATABASE ':memory:' AS dim");
  db.run("ATTACH DATABASE ':memory:' AS ads");

  // 建表 + 插入数据
  SCHEMA.forEach(t => {
    db.run(t.ddl);
    const placeholders = t.columns.map(() => '?').join(',');
    const stmt = db.prepare(`INSERT INTO ${t.db}.${t.name} VALUES (${placeholders})`);
    t.rows.forEach(row => { stmt.run(row); });
    stmt.free();
  });

  // ---- 注册 Hive 自定义函数 ----

  // NVL(val, default) — 空值替换
  db.create_function('NVL', (val, def) => (val === null || val === undefined) ? def : val);

  // IF(cond, true_val, false_val) — 条件表达式
  db.create_function('IF', (cond, tval, fval) => cond ? tval : fval);

  // CONCAT(s1, s2, ...) — 字符串连接
  db.create_function('CONCAT', function() {
    const args = Array.from(arguments);
    if (args.some(a => a === null || a === undefined)) return null;
    return args.join('');
  });

  // CONCAT_WS(sep, s1, s2, ...) — 带分隔符连接, 跳过 NULL
  db.create_function('CONCAT_WS', function() {
    const args = Array.from(arguments);
    const sep = args[0];
    return args.slice(1).filter(a => a !== null && a !== undefined).join(sep);
  });

  // DATEDIFF(d1, d2) — 日期差(天)
  db.create_function('DATEDIFF', (d1, d2) => {
    if (!d1 || !d2) return null;
    const a = new Date(String(d1).substring(0, 10));
    const b = new Date(String(d2).substring(0, 10));
    return Math.round((a - b) / 86400000);
  });

  // DATE_ADD(date, days) — 日期加天数
  db.create_function('DATE_ADD', (dateStr, days) => {
    if (!dateStr) return null;
    const d = new Date(String(dateStr).substring(0, 10));
    d.setDate(d.getDate() + Number(days));
    return d.toISOString().substring(0, 10);
  });

  // DATE_SUB(date, days) — 日期减天数
  db.create_function('DATE_SUB', (dateStr, days) => {
    if (!dateStr) return null;
    const d = new Date(String(dateStr).substring(0, 10));
    d.setDate(d.getDate() - Number(days));
    return d.toISOString().substring(0, 10);
  });

  // TO_DATE(timestamp_str) — 提取日期部分
  db.create_function('TO_DATE', (ts) => {
    if (!ts) return null;
    return String(ts).substring(0, 10);
  });

  // YEAR / MONTH / DAY — 提取年/月/日
  db.create_function('YEAR', (d) => {
    if (!d) return null;
    return parseInt(String(d).substring(0, 4), 10);
  });
  db.create_function('MONTH', (d) => {
    if (!d) return null;
    return parseInt(String(d).substring(5, 7), 10);
  });
  db.create_function('DAY', (d) => {
    if (!d) return null;
    return parseInt(String(d).substring(8, 10), 10);
  });

  // SIZE(str) — 模拟数组长度(按逗号分隔计数)
  db.create_function('SIZE', (str) => {
    if (str === null || str === undefined) return 0;
    return String(str).split(',').length;
  });

  console.log('Database initialized with Hive functions.');
}

// 编辑器/结果区拖拽调整大小
(function() {
  const handle = document.getElementById('resizeHandle');
  const editorArea = document.querySelector('.editor-area');
  let startY, startH;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startY = e.clientY;
    startH = editorArea.offsetHeight;
    handle.classList.add('active');
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', onRelease);
  });

  function onDrag(e) {
    const delta = e.clientY - startY;
    const newH = Math.max(80, Math.min(startH + delta, window.innerHeight - 200));
    editor.setSize(null, newH);
    editorArea.style.height = newH + 'px';
  }

  function onRelease() {
    handle.classList.remove('active');
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', onRelease);
  }
})();
